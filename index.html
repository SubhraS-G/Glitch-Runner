<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GLITCH RUNNER</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
  overflow: hidden;
  font-family: 'Orbitron', monospace;
}
#wrapper {
  position: relative;
  width: 800px;
  height: 400px;
}
canvas {
  display: block;
  border: 1px solid #0ff3;
  box-shadow: 0 0 40px #0ff3, 0 0 80px #f0f1, inset 0 0 40px #0001;
}
#ui {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
}
#hud {
  position: absolute;
  top: 16px; left: 20px; right: 20px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}
.hud-block { display: flex; flex-direction: column; gap: 2px; }
.hud-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: #0ff8;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.hud-value {
  font-size: 22px;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 10px #0ff, 0 0 20px #0ff8;
  letter-spacing: 0.05em;
}
.hud-value.pink { text-shadow: 0 0 10px #f0f, 0 0 20px #f0f8; color: #fdf; }
#screen-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.82);
  backdrop-filter: blur(2px);
  pointer-events: all;
  transition: opacity 0.3s;
}
#screen-overlay.hidden { display: none; }
.title-glitch {
  font-size: 52px;
  font-weight: 900;
  color: #fff;
  text-shadow: 0 0 20px #0ff, 0 0 40px #0ff8;
  letter-spacing: 0.12em;
  position: relative;
  animation: glitchTitle 3s infinite;
}
@keyframes glitchTitle {
  0%,90%,100% { text-shadow: 0 0 20px #0ff, 0 0 40px #0ff8; transform: none; }
  92% { text-shadow: -3px 0 #f0f, 3px 0 #0ff; transform: skewX(-5deg); }
  94% { text-shadow: 3px 0 #f0f, -3px 0 #0ff; transform: skewX(3deg); }
  96% { text-shadow: 0 0 20px #0ff, 0 0 40px #0ff8; transform: none; }
}
.subtitle {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: #0ff9;
  letter-spacing: 0.3em;
  margin-top: 6px;
  margin-bottom: 32px;
}
.start-btn {
  background: transparent;
  border: 1.5px solid #0ff;
  color: #0ff;
  font-family: 'Orbitron', monospace;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 0.2em;
  padding: 12px 36px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.2s;
  box-shadow: 0 0 20px #0ff3, inset 0 0 20px #0ff1;
  pointer-events: all;
}
.start-btn:hover {
  background: #0ff2;
  box-shadow: 0 0 30px #0ff6, inset 0 0 20px #0ff2;
  transform: scale(1.04);
}
.controls-hint {
  font-family: 'Share Tech Mono', monospace;
  font-size: 10px;
  color: #fff5;
  margin-top: 20px;
  letter-spacing: 0.15em;
}
#gameover-score {
  font-size: 14px;
  color: #f0f;
  font-family: 'Share Tech Mono', monospace;
  letter-spacing: 0.15em;
  margin-bottom: 6px;
  text-shadow: 0 0 10px #f0f;
}
#best-score {
  font-size: 11px;
  color: #0ff8;
  font-family: 'Share Tech Mono', monospace;
  letter-spacing: 0.12em;
  margin-bottom: 28px;
}
/* scanlines overlay */
#scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,0,0,0.08) 2px,
    rgba(0,0,0,0.08) 4px
  );
  pointer-events: none;
  z-index: 10;
}
</style>
</head>
<body>
<div id="wrapper">
  <canvas id="c" width="800" height="400"></canvas>
  <div id="scanlines"></div>
  <div id="ui">
    <div id="hud">
      <div class="hud-block">
        <span class="hud-label">Score</span>
        <span class="hud-value" id="scoreDisplay">0</span>
      </div>
      <div class="hud-block" style="text-align:center">
        <span class="hud-label">Lives</span>
        <span class="hud-value pink" id="livesDisplay">♥ ♥ ♥</span>
      </div>
      <div class="hud-block" style="text-align:right">
        <span class="hud-label">Best</span>
        <span class="hud-value" id="bestDisplay">0</span>
      </div>
    </div>
    <div id="screen-overlay" id="overlay">
      <div class="title-glitch">GLITCH RUNNER</div>
      <div class="subtitle">// CYBERPUNK ENDLESS RUNNER //</div>
      <div id="gameover-score" style="display:none"></div>
      <div id="best-score" style="display:none"></div>
      <div id="instructions" style="
        display:flex; gap:10px; margin-bottom:24px; flex-wrap:wrap; justify-content:center;
      ">
        <div style="background:rgba(0,255,255,0.06);border:1px solid #0ff4;border-radius:10px;padding:10px 18px;text-align:center;">
          <div style="font-family:'Share Tech Mono',monospace;font-size:18px;color:#0ff;margin-bottom:4px;">SPACE</div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#0ff8;letter-spacing:0.15em;">JUMP</div>
        </div>
        <div style="background:rgba(0,255,255,0.06);border:1px solid #0ff4;border-radius:10px;padding:10px 18px;text-align:center;">
          <div style="font-family:'Share Tech Mono',monospace;font-size:18px;color:#0ff;margin-bottom:4px;">SPACE×2</div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#0ff8;letter-spacing:0.15em;">DOUBLE JUMP</div>
        </div>
        <div style="background:rgba(255,255,0,0.06);border:1px solid #ff04;border-radius:10px;padding:10px 18px;text-align:center;">
          <div style="font-family:'Share Tech Mono',monospace;font-size:18px;color:#ff0;margin-bottom:4px;">⭐ ORB</div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#ff08;letter-spacing:0.15em;">+10 SCORE</div>
        </div>
        <div style="background:rgba(255,0,0,0.06);border:1px solid #f004;border-radius:10px;padding:10px 18px;text-align:center;">
          <div style="font-family:'Share Tech Mono',monospace;font-size:18px;color:#f88;margin-bottom:4px;">♥ ♥ ♥</div>
          <div style="font-family:'Share Tech Mono',monospace;font-size:9px;color:#f884;letter-spacing:0.15em;">3 LIVES</div>
        </div>
      </div>
      <button class="start-btn" id="startBtn" onclick="startGame()">[ BOOT SYSTEM ]</button>
      <div class="controls-hint" style="margin-top:14px;font-family:'Share Tech Mono',monospace;font-size:10px;color:#fff4;letter-spacing:0.12em;">
        MOBILE: TAP TO JUMP &nbsp;·&nbsp; SPEED INCREASES OVER TIME
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 800, H = 400;

// ── State ──────────────────────────────────────────────
let state = 'menu'; // menu | playing | dead
let score = 0, bestScore = parseInt(localStorage.getItem('gr_best') || '0');
let lives = 3, frame = 0, speed = 2, spawnTimer = 0, spawnInterval = 110;
let particles = [], obstacles = [], orbs = [], drones = [], bgBuildings = [], bgStars = [];
let screenShake = 0;
let glitchTimer = 0;

// ── Player ─────────────────────────────────────────────
const player = {
  x: 120, y: 0, w: 28, h: 36,
  vy: 0, jumps: 0, maxJumps: 2,
  grounded: false,
  invincible: 0,
  trail: [],
  color: '#0ff',
  glitchOffset: 0,
};
const GROUND = H - 70;

// ── Init bg ────────────────────────────────────────────
function initBg() {
  bgStars = [];
  for (let i = 0; i < 80; i++) {
    bgStars.push({ x: Math.random()*W, y: Math.random()*(H*0.55), r: Math.random()*1.2+0.2, s: Math.random()*0.3+0.1 });
  }
  bgBuildings = [];
  // Far buildings
  for (let i = 0; i < 18; i++) {
    const bw = 28 + Math.random()*30;
    bgBuildings.push({
      x: i*(W/17), y: 0, w: bw,
      h: 60 + Math.random()*100,
      layer: 0,
      color: `hsl(${200+Math.random()*60},60%,${8+Math.random()*8}%)`,
      windows: Math.random() > 0.4,
      wx: Math.random()*4, wy: Math.random()*6,
    });
  }
  // Near buildings
  for (let i = 0; i < 10; i++) {
    const bw = 50 + Math.random()*60;
    bgBuildings.push({
      x: i*(W/9), y: 0, w: bw,
      h: 80 + Math.random()*120,
      layer: 1,
      color: `hsl(${220+Math.random()*40},50%,${5+Math.random()*6}%)`,
      windows: Math.random() > 0.3,
      wx: Math.random()*5, wy: Math.random()*8,
    });
  }
}

// ── Reset ──────────────────────────────────────────────
function reset() {
  score = 0; frame = 0; speed = 2; spawnTimer = 0; spawnInterval = 110;
  lives = 3; screenShake = 0; glitchTimer = 0;
  particles = []; obstacles = []; orbs = []; drones = [];
  player.y = GROUND - player.h;
  player.vy = 0; player.jumps = 0; player.grounded = true;
  player.invincible = 0; player.trail = [];
  updateHUD();
}

// ── HUD ────────────────────────────────────────────────
function updateHUD() {
  document.getElementById('scoreDisplay').textContent = score;
  document.getElementById('bestDisplay').textContent = bestScore;
  const hearts = ['♥ ♥ ♥','♥ ♥ ☆','♥ ☆ ☆','☆ ☆ ☆'];
  document.getElementById('livesDisplay').textContent = hearts[Math.max(0,3-lives)];
}

// ── Jump ───────────────────────────────────────────────
function jump() {
  if (state !== 'playing') return;
  if (player.jumps < player.maxJumps) {
    player.vy = -13;
    player.jumps++;
    player.grounded = false;
    spawnJumpParticles();
  }
}

document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); jump(); } });
canvas.addEventListener('click', jump);
document.getElementById('startBtn').addEventListener('click', e => e.stopPropagation());

// ── Start ──────────────────────────────────────────────
function startGame() {
  reset();
  state = 'playing';
  document.getElementById('screen-overlay').classList.add('hidden');
  requestAnimationFrame(loop);
}

// ── Particles ──────────────────────────────────────────
function spawnParticle(x, y, color, vx, vy, life, size) {
  particles.push({ x, y, vx, vy, color, life, maxLife: life, size: size||3 });
}
function spawnJumpParticles() {
  for (let i = 0; i < 8; i++) {
    spawnParticle(player.x+player.w/2, player.y+player.h,
      Math.random()>0.5?'#0ff':'#f0f',
      (Math.random()-0.5)*4, Math.random()*3+1, 20+Math.random()*10, 2+Math.random()*2);
  }
}
function spawnDeathParticles(x, y) {
  for (let i = 0; i < 30; i++) {
    const angle = Math.random()*Math.PI*2;
    const spd = Math.random()*6+2;
    spawnParticle(x, y,
      ['#0ff','#f0f','#ff0','#fff'][Math.floor(Math.random()*4)],
      Math.cos(angle)*spd, Math.sin(angle)*spd, 40+Math.random()*20, 2+Math.random()*3);
  }
}
function spawnOrbParticles(x, y) {
  for (let i = 0; i < 12; i++) {
    const angle = Math.random()*Math.PI*2;
    spawnParticle(x, y, '#ff0',
      Math.cos(angle)*3, Math.sin(angle)*3, 20, 2);
  }
}

// ── Spawn ──────────────────────────────────────────────
function spawnObstacle() {
  const type = Math.random();
  if (type < 0.35) {
    // Ground barrier
    const h = 30 + Math.random()*40;
    obstacles.push({ x: W+10, y: GROUND-h, w: 18, h, type:'barrier', color:'#f0f', glow:'#f0f' });
  } else if (type < 0.6) {
    // Electric wall (tall)
    const h = 60 + Math.random()*50;
    obstacles.push({ x: W+10, y: GROUND-h, w: 14, h, type:'electric', color:'#0ff', glow:'#0ff', phase: Math.random()*Math.PI*2 });
  } else if (type < 0.78) {
    // Low ceiling spike
    obstacles.push({ x: W+10, y: 60+Math.random()*60, w: 20, h: 30, type:'ceiling', color:'#f80', glow:'#f80' });
  } else if (type < 0.9) {
    // Double barrier gap
    const gap = 80 + Math.random()*40;
    const gapY = 80 + Math.random()*(GROUND-80-gap-40);
    obstacles.push({ x: W+10, y: 0, w: 16, h: gapY, type:'wall', color:'#f0f', glow:'#f0f' });
    obstacles.push({ x: W+10, y: gapY+gap, w: 16, h: H-gapY-gap, type:'wall', color:'#f0f', glow:'#f0f' });
  } else {
    // Moving spike
    obstacles.push({ x: W+10, y: GROUND-35, w: 22, h: 35, type:'spike', color:'#ff0', glow:'#ff0', oy: GROUND-35, amp: 30+Math.random()*30, spd: 0.04+Math.random()*0.03, phase: Math.random()*Math.PI*2 });
  }
}

function spawnOrb() {
  const y = (GROUND - 120) + Math.random()*80;
  orbs.push({ x: W+10, y, r: 7, phase: Math.random()*Math.PI*2 });
}

function spawnDrone() {
  const y = 60 + Math.random()*120;
  drones.push({ x: W+30, y, vy: (Math.random()-0.5)*1.5, phase: Math.random()*Math.PI*2, hp: 1 });
}

// ── Collision (AABB) ───────────────────────────────────
function rectsOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}
function circRect(cx,cy,cr, rx,ry,rw,rh) {
  const nx = Math.max(rx, Math.min(cx, rx+rw));
  const ny = Math.max(ry, Math.min(cy, ry+rh));
  const dx = cx-nx, dy = cy-ny;
  return dx*dx+dy*dy < cr*cr;
}

// ── Hit player ────────────────────────────────────────
function hitPlayer() {
  if (player.invincible > 0) return;
  lives--;
  screenShake = 18;
  glitchTimer = 25;
  spawnDeathParticles(player.x+player.w/2, player.y+player.h/2);
  player.invincible = 90;
  updateHUD();
  if (lives <= 0) endGame();
}

function endGame() {
  state = 'dead';
  if (score > bestScore) { bestScore = score; localStorage.setItem('gr_best', bestScore); }
  const overlay = document.getElementById('screen-overlay');
  overlay.classList.remove('hidden');
  document.getElementById('gameover-score').style.display = 'block';
  document.getElementById('gameover-score').textContent = `// SCORE: ${score} //`;
  document.getElementById('best-score').style.display = 'block';
  document.getElementById('best-score').textContent = `BEST: ${bestScore}`;
  document.getElementById('startBtn').textContent = '[ REBOOT ]';
  document.querySelector('.title-glitch').textContent = 'GAME OVER';
  updateHUD();
}

// ── Draw helpers ───────────────────────────────────────
function drawGlowRect(x, y, w, h, color, glow, alpha=1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.shadowColor = glow || color;
  ctx.shadowBlur = 18;
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawGlowCircle(x, y, r, color, glow) {
  ctx.save();
  ctx.shadowColor = glow || color;
  ctx.shadowBlur = 20;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// ── Cached gradients (created once, not per frame) ─────
let skyGrad = null;
function getSkyGrad() {
  if (!skyGrad) {
    skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#04010f');
    skyGrad.addColorStop(0.5, '#090420');
    skyGrad.addColorStop(1, '#0a0318');
  }
  return skyGrad;
}

// ── Draw Background ────────────────────────────────────
function drawBackground() {
  // Sky gradient — cached
  ctx.fillStyle = getSkyGrad();
  ctx.fillRect(0, 0, W, H);

  // Stars
  bgStars.forEach(s => {
    s.x -= s.s;
    if (s.x < 0) { s.x = W; s.y = Math.random()*(H*0.55); }
    const flicker = 0.6 + Math.sin(frame*0.05 + s.x)*0.4;
    ctx.globalAlpha = flicker * 0.7;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  // Moon / neon circle
  ctx.save();
  ctx.shadowColor = '#f0f';
  ctx.shadowBlur = 30;
  ctx.strokeStyle = '#f0f6';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(680, 55, 28, 0, Math.PI*2);
  ctx.stroke();
  ctx.restore();

  // Far buildings
  bgBuildings.filter(b => b.layer===0).forEach(b => {
    b.x -= 0.4;
    if (b.x + b.w < 0) b.x = W + Math.random()*40;
    const by = H - 70 - b.h;
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, by, b.w, b.h);
    // Windows
    if (b.windows) {
      for (let wy = by+6; wy < H-70-6; wy += 10) {
        for (let wx = b.x+4; wx < b.x+b.w-4; wx += 8) {
          if (Math.random() > 0.55) {
            ctx.fillStyle = Math.random()>0.5 ? '#0ff3' : '#f0f2';
            ctx.fillRect(wx, wy, 4, 5);
          }
        }
      }
    }
    // Roof light — no shadow for perf
    ctx.fillStyle = '#f0f';
    ctx.fillRect(b.x + b.w/2 - 1, by, 2, 4);
  });

  // Near buildings
  bgBuildings.filter(b => b.layer===1).forEach(b => {
    b.x -= 1.2;
    if (b.x + b.w < 0) b.x = W + Math.random()*40;
    const by = H - 70 - b.h;
    ctx.fillStyle = b.color;
    ctx.fillRect(b.x, by, b.w, b.h);
    if (b.windows) {
      for (let wy = by+8; wy < H-70-8; wy += 12) {
        for (let wx = b.x+5; wx < b.x+b.w-5; wx += 10) {
          if (Math.random() > 0.6) {
            ctx.fillStyle = Math.random()>0.5 ? '#0ff4' : '#ff04';
            ctx.fillRect(wx, wy, 5, 6);
          }
        }
      }
    }
    // Roof light — no shadow for perf
    ctx.fillStyle = '#0ff';
    ctx.fillRect(b.x + b.w/2 - 1, by, 2, 5);
  });

  // Ground
  const ggrad = ctx.createLinearGradient(0, GROUND, 0, H);
  ggrad.addColorStop(0, '#0a0520');
  ggrad.addColorStop(1, '#050210');
  ctx.fillStyle = ggrad;
  ctx.fillRect(0, GROUND, W, H - GROUND);

  // Ground neon line — no shadowBlur for perf
  ctx.save();
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND);
  ctx.lineTo(W, GROUND);
  ctx.stroke();

  // Ground grid lines
  ctx.shadowBlur = 0;
  ctx.strokeStyle = '#0ff2';
  ctx.lineWidth = 0.5;
  for (let gx = (frame * speed * 0.5) % 60; gx < W; gx += 60) {
    ctx.beginPath();
    ctx.moveTo(gx, GROUND);
    ctx.lineTo(gx - 20, H);
    ctx.stroke();
  }
  ctx.restore();

  // Distant neon glow on horizon
  const hglow = ctx.createLinearGradient(0, GROUND-20, 0, GROUND);
  hglow.addColorStop(0, 'transparent');
  hglow.addColorStop(1, 'rgba(255,0,255,0.09)');
  ctx.fillStyle = hglow;
  ctx.fillRect(0, GROUND-20, W, 20);
}

// ── Draw Player ────────────────────────────────────────
function drawPlayer() {
  const px = player.x, py = player.y, pw = player.w, ph = player.h;
  const inv = player.invincible > 0;
  if (inv && Math.floor(frame/4)%2===0) return;

  // Trail
  player.trail.push({ x: px, y: py, alpha: 0.4 });
  if (player.trail.length > 10) player.trail.shift();
  player.trail.forEach((t, i) => {
    const a = (i / player.trail.length) * t.alpha;
    ctx.globalAlpha = a;
    ctx.fillStyle = '#0ff';
    ctx.fillRect(t.x + 4, t.y + 4, pw - 8, ph - 8);
    ctx.globalAlpha = 1;
  });

  // Glitch offset
  const gx = glitchTimer > 0 && Math.random() > 0.6 ? (Math.random()-0.5)*6 : 0;

  // Body
  ctx.save();
  ctx.shadowColor = '#0ff';
  ctx.shadowBlur = 20;
  ctx.fillStyle = '#001a1a';
  ctx.fillRect(px+gx, py, pw, ph);
  ctx.strokeStyle = '#0ff';
  ctx.lineWidth = 2;
  ctx.strokeRect(px+gx, py, pw, ph);

  // Visor
  ctx.fillStyle = '#0ff';
  ctx.fillRect(px+gx+5, py+7, pw-10, 8);

  // Legs animation
  const legAnim = player.grounded ? Math.sin(frame * 0.25) * 5 : 0;
  ctx.fillStyle = '#0ff8';
  ctx.fillRect(px+gx+4, py+ph-10, 8, 10 + (legAnim > 0 ? legAnim : 0));
  ctx.fillRect(px+gx+pw-12, py+ph-10, 8, 10 + (legAnim < 0 ? -legAnim : 0));

  // Chest detail
  ctx.strokeStyle = '#0ff5';
  ctx.lineWidth = 1;
  ctx.strokeRect(px+gx+6, py+18, pw-12, ph-28);

  // Energy core blink — no shadowBlur for perf
  ctx.fillStyle = `rgba(0,255,255,${0.5+Math.sin(frame*0.1)*0.5})`;
  ctx.beginPath();
  ctx.arc(px+gx+pw/2, py+ph/2+2, 4, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// ── Draw Obstacles ─────────────────────────────────────
function drawObstacles() {
  obstacles.forEach(o => {
    ctx.save();
    // No shadowBlur per obstacle — too expensive per frame

    if (o.type === 'electric') {
      // Animated electric wall
      const flicker = 0.7 + Math.sin(frame*0.3 + o.phase)*0.3;
      ctx.globalAlpha = flicker;
      ctx.fillStyle = o.color;
      ctx.fillRect(o.x, o.y, o.w, o.h);
      // Lightning bolts
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.globalAlpha = flicker * 0.8;
      for (let ly = o.y; ly < o.y+o.h; ly += 20) {
        ctx.beginPath();
        ctx.moveTo(o.x, ly);
        ctx.lineTo(o.x + (Math.random()-0.5)*8 + o.w/2, ly+10);
        ctx.lineTo(o.x + o.w, ly+20);
        ctx.stroke();
      }
    } else if (o.type === 'ceiling') {
      ctx.fillStyle = o.color;
      ctx.fillRect(o.x, o.y, o.w, o.h);
      // Spikes
      ctx.fillStyle = '#fff';
      for (let sx = o.x; sx < o.x+o.w; sx += 8) {
        ctx.beginPath();
        ctx.moveTo(sx, o.y+o.h);
        ctx.lineTo(sx+4, o.y+o.h+12);
        ctx.lineTo(sx+8, o.y+o.h);
        ctx.fill();
      }
    } else if (o.type === 'spike') {
      ctx.fillStyle = o.color;
      ctx.beginPath();
      ctx.moveTo(o.x, o.y+o.h);
      ctx.lineTo(o.x+o.w/2, o.y);
      ctx.lineTo(o.x+o.w, o.y+o.h);
      ctx.closePath();
      ctx.fill();
    } else {
      ctx.fillStyle = o.color;
      ctx.fillRect(o.x, o.y, o.w, o.h);
      // Barrier detail
      if (o.type === 'barrier') {
        ctx.strokeStyle = '#fff5';
        ctx.lineWidth = 1;
        for (let dy = o.y+8; dy < o.y+o.h; dy += 12) {
          ctx.beginPath();
          ctx.moveTo(o.x+2, dy);
          ctx.lineTo(o.x+o.w-2, dy);
          ctx.stroke();
        }
      }
    }
    ctx.restore();
  });
}

// ── Draw Orbs ──────────────────────────────────────────
function drawOrbs() {
  orbs.forEach(o => {
    o.phase += 0.05;
    const fy = o.y + Math.sin(o.phase)*5;
    ctx.save();
    // Outer ring
    ctx.strokeStyle = '#ff08';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(o.x, fy, o.r+4, 0, Math.PI*2);
    ctx.stroke();
    // Core
    ctx.fillStyle = '#ff0';
    ctx.beginPath();
    ctx.arc(o.x, fy, o.r, 0, Math.PI*2);
    ctx.fill();
    // Inner
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(o.x-2, fy-2, o.r*0.35, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

// ── Draw Drones ────────────────────────────────────────
function drawDrones() {
  drones.forEach(d => {
    ctx.save();
    // Body
    ctx.fillStyle = '#1a0800';
    ctx.strokeStyle = '#f80';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(d.x, d.y, 18, 10, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
    // Rotors
    const rot = frame * 0.3;
    ctx.strokeStyle = '#f808';
    ctx.lineWidth = 1;
    [[-14,-6],[14,-6],[-14,6],[14,6]].forEach(([rx,ry]) => {
      ctx.save();
      ctx.translate(d.x+rx, d.y+ry);
      ctx.rotate(rot);
      ctx.beginPath();
      ctx.moveTo(-6,0); ctx.lineTo(6,0);
      ctx.stroke();
      ctx.rotate(Math.PI/2);
      ctx.beginPath();
      ctx.moveTo(-6,0); ctx.lineTo(6,0);
      ctx.stroke();
      ctx.restore();
    });
    // Eye
    ctx.fillStyle = '#f44';
    ctx.beginPath();
    ctx.arc(d.x+8, d.y, 3, 0, Math.PI*2);
    ctx.fill();
    // Laser
    ctx.strokeStyle = '#f002';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(d.x+11, d.y);
    ctx.lineTo(player.x, d.y);
    ctx.stroke();
    ctx.restore();
  });
}

// ── Draw Particles ─────────────────────────────────────
function drawParticles() {
  particles.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    ctx.globalAlpha = 1;
  });
}

// ── Glitch overlay ─────────────────────────────────────
function drawGlitch() {
  if (glitchTimer <= 0) return;
  const strips = Math.floor(Math.random()*5)+2;
  for (let i = 0; i < strips; i++) {
    const gy = Math.random()*H;
    const gh = Math.random()*20+4;
    const goffset = (Math.random()-0.5)*20;
    const gw = Math.random()*200+50;
    const gx = Math.random()*(W-gw);
    ctx.save();
    ctx.globalAlpha = 0.15 + Math.random()*0.2;
    const imgData = ctx.getImageData(gx, gy, gw, gh);
    ctx.putImageData(imgData, gx+goffset, gy);
    ctx.restore();
  }
  // Color shift
  ctx.save();
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = '#f0f';
  ctx.fillRect(Math.random()*4-2, 0, W, H);
  ctx.fillStyle = '#0ff';
  ctx.fillRect(Math.random()*4-2+2, 0, W, H);
  ctx.restore();
}

// ── Update ─────────────────────────────────────────────
function update() {
  frame++;
  score = Math.floor(frame * speed * 0.04);
  if (score > bestScore) bestScore = score;

  // Speed ramp — gradual increase every 400 frames
  if (frame % 400 === 0) {
    speed = Math.min(speed + 0.25, 10);
    spawnInterval = Math.max(spawnInterval - 3, 50);
  }

  // Player physics
  player.vy += 0.55;
  player.y += player.vy;
  if (player.y >= GROUND - player.h) {
    player.y = GROUND - player.h;
    player.vy = 0;
    player.jumps = 0;
    player.grounded = true;
  } else {
    player.grounded = false;
  }
  if (player.invincible > 0) player.invincible--;
  if (glitchTimer > 0) glitchTimer--;
  if (screenShake > 0) screenShake--;

  // Spawn
  spawnTimer++;
  if (spawnTimer >= spawnInterval) {
    spawnObstacle();
    spawnTimer = 0;
    if (Math.random() > 0.5) spawnOrb();
    if (Math.random() > 0.7 && frame > 400) spawnDrone();
  }

  // Move obstacles
  obstacles.forEach(o => {
    o.x -= speed;
    if (o.type === 'spike') o.y = o.oy + Math.sin(frame*o.spd + o.phase)*o.amp;
  });
  obstacles = obstacles.filter(o => o.x + o.w > -20);

  // Move orbs
  orbs.forEach(o => o.x -= speed);
  orbs = orbs.filter(o => o.x + o.r > -20);

  // Move drones
  drones.forEach(d => {
    d.x -= speed * 0.7;
    d.y += d.vy;
    d.phase += 0.02;
    d.y += Math.sin(d.phase) * 0.5;
  });
  drones = drones.filter(d => d.x > -50);

  // Update particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.15;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);

  // Collisions — obstacles
  const px = player.x + 4, py = player.y + 4, pw = player.w - 8, ph = player.h - 4;
  obstacles.forEach(o => {
    if (rectsOverlap(px,py,pw,ph, o.x,o.y,o.w,o.h)) hitPlayer();
  });

  // Collisions — orbs
  orbs = orbs.filter(o => {
    if (circRect(o.x, o.y + Math.sin(o.phase)*5, o.r, px,py,pw,ph)) {
      spawnOrbParticles(o.x, o.y);
      score += 10;
      return false;
    }
    return true;
  });

  // Collisions — drones
  drones.forEach(d => {
    if (rectsOverlap(px,py,pw,ph, d.x-18,d.y-10,36,20)) hitPlayer();
  });

  updateHUD();
}

// ── Loop ───────────────────────────────────────────────
function loop() {
  if (state !== 'playing') return;

  // Screen shake
  ctx.save();
  if (screenShake > 0) {
    ctx.translate((Math.random()-0.5)*screenShake*0.5, (Math.random()-0.5)*screenShake*0.5);
  }

  drawBackground();
  drawOrbs();
  drawObstacles();
  drawDrones();
  drawPlayer();
  drawParticles();
  drawGlitch();

  ctx.restore();

  update();
  requestAnimationFrame(loop);
}

// ── Init ───────────────────────────────────────────────
initBg();
updateHUD();

// Idle animation on menu
function menuLoop() {
  if (state !== 'menu' && state !== 'dead') return;
  drawBackground();
  requestAnimationFrame(menuLoop);
}
menuLoop();
</script>
